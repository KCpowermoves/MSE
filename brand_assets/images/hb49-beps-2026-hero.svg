<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1520;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#1A2332;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e2d42;stop-opacity:1"/>
    </linearGradient>
    <!-- Gold shimmer -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c98b0a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#F4A11D;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8930f;stop-opacity:1"/>
    </linearGradient>
    <!-- Red accent -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e01235;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8102E;stop-opacity:1"/>
    </linearGradient>
    <!-- Glow effect for dome -->
    <radialGradient id="domeGlow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" style="stop-color:#F4A11D;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#F4A11D;stop-opacity:0"/>
    </radialGradient>
    <!-- Building window glow -->
    <radialGradient id="winGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F4A11D;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#F4A11D;stop-opacity:0.3"/>
    </radialGradient>
    <!-- Clip path for chart -->
    <clipPath id="chartClip">
      <rect x="760" y="180" width="380" height="280"/>
    </clipPath>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(244,161,29,0.06)" stroke-width="0.5"/>
    </pattern>
    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>
  <!-- Grid overlay -->
  <rect width="1200" height="600" fill="url(#grid)"/>
  <!-- Subtle texture -->
  <rect width="1200" height="600" fill="rgba(255,255,255,0.012)" filter="url(#noise)"/>

  <!-- Horizon glow -->
  <ellipse cx="600" cy="600" rx="700" ry="200" fill="rgba(244,161,29,0.05)"/>

  <!-- === BACKGROUND CITY SKYLINE === -->
  <!-- Far left buildings -->
  <rect x="0" y="340" width="60" height="260" fill="rgba(26,35,50,0.6)"/>
  <rect x="10" y="310" width="40" height="30" fill="rgba(26,35,50,0.6)"/>
  <rect x="70" y="370" width="80" height="230" fill="rgba(26,35,50,0.5)"/>
  <rect x="80" y="350" width="60" height="20" fill="rgba(26,35,50,0.5)"/>
  <rect x="160" y="300" width="50" height="300" fill="rgba(26,35,50,0.55)"/>
  <rect x="170" y="280" width="30" height="20" fill="rgba(26,35,50,0.55)"/>

  <!-- Far right buildings -->
  <rect x="1050" y="330" width="70" height="270" fill="rgba(26,35,50,0.5)"/>
  <rect x="1130" y="360" width="70" height="240" fill="rgba(26,35,50,0.45)"/>
  <rect x="1080" y="310" width="40" height="20" fill="rgba(26,35,50,0.5)"/>

  <!-- === MAIN CAPITOL BUILDING === -->
  <!-- Base / steps -->
  <rect x="380" y="480" width="440" height="12" fill="#2a3a52" rx="2"/>
  <rect x="390" y="468" width="420" height="12" fill="#2d3e57" rx="2"/>
  <rect x="402" y="456" width="396" height="12" fill="#304459" rx="2"/>

  <!-- Main building body -->
  <rect x="420" y="310" width="360" height="148" fill="#253247"/>
  <!-- Building texture lines -->
  <line x1="420" y1="340" x2="780" y2="340" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="420" y1="370" x2="780" y2="370" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="420" y1="400" x2="780" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="420" y1="430" x2="780" y2="430" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Wing columns (left) -->
  <rect x="430" y="316" width="12" height="142" fill="#1e2d42" rx="1"/>
  <rect x="448" y="316" width="12" height="142" fill="#1e2d42" rx="1"/>
  <rect x="466" y="316" width="12" height="142" fill="#1e2d42" rx="1"/>
  <!-- Wing columns (right) -->
  <rect x="758" y="316" width="12" height="142" fill="#1e2d42" rx="1"/>
  <rect x="740" y="316" width="12" height="142" fill="#1e2d42" rx="1"/>
  <rect x="722" y="316" width="12" height="142" fill="#1e2d42" rx="1"/>

  <!-- Pediment / portico -->
  <polygon points="480,310 600,265 720,310" fill="#1d2c40"/>
  <line x1="480" y1="310" x2="720" y2="310" stroke="rgba(244,161,29,0.3)" stroke-width="1.5"/>
  <!-- Pediment columns -->
  <rect x="492" y="310" width="10" height="148" fill="#1a2836" rx="1"/>
  <rect x="512" y="310" width="10" height="148" fill="#1a2836" rx="1"/>
  <rect x="532" y="310" width="10" height="148" fill="#1a2836" rx="1"/>
  <rect x="552" y="310" width="10" height="148" fill="#1a2836" rx="1"/>
  <rect x="638" y="310" width="10" height="148" fill="#1a2836" rx="1"/>
  <rect x="658" y="310" width="10" height="148" fill="#1a2836" rx="1"/>
  <rect x="678" y="310" width="10" height="148" fill="#1a2836" rx="1"/>
  <rect x="698" y="310" width="10" height="148" fill="#1a2836" rx="1"/>

  <!-- Entablature above columns -->
  <rect x="485" y="306" width="230" height="6" fill="#F4A11D" rx="1" opacity="0.5"/>

  <!-- Drum of dome -->
  <rect x="548" y="225" width="104" height="42" fill="#1c2b3e" rx="2"/>
  <!-- Drum windows -->
  <rect x="558" y="232" width="14" height="20" fill="rgba(244,161,29,0.25)" rx="2"/>
  <rect x="578" y="232" width="14" height="20" fill="rgba(244,161,29,0.35)" rx="2"/>
  <rect x="598" y="232" width="14" height="20" fill="rgba(244,161,29,0.2)" rx="2"/>
  <rect x="618" y="232" width="14" height="20" fill="rgba(244,161,29,0.3)" rx="2"/>
  <rect x="638" y="232" width="14" height="20" fill="rgba(244,161,29,0.25)" rx="2"/>

  <!-- Main dome -->
  <ellipse cx="600" cy="220" rx="70" ry="16" fill="#1c2b3e"/>
  <path d="M 530 220 Q 530 130 600 115 Q 670 130 670 220 Z" fill="#1f3048"/>
  <!-- Dome ribs -->
  <path d="M 600 115 L 530 220" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M 600 115 L 548 210" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M 600 115 L 565 202" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M 600 115 L 670 220" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M 600 115 L 652 210" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M 600 115 L 635 202" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M 600 115 L 600 220" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Dome lantern -->
  <rect x="591" y="100" width="18" height="18" fill="#1f3048" rx="2"/>
  <rect x="594" y="96" width="12" height="6" fill="#253a56" rx="1"/>
  <!-- Finial / flag pole -->
  <line x1="600" y1="96" x2="600" y2="65" stroke="#F4A11D" stroke-width="2"/>
  <polygon points="600,65 620,72 600,79" fill="#C8102E"/>
  <line x1="600" y1="72" x2="620" y2="72" stroke="#C8102E" stroke-width="0.5" opacity="0.5"/>

  <!-- Dome glow -->
  <ellipse cx="600" cy="175" rx="85" ry="80" fill="url(#domeGlow)"/>

  <!-- Building windows (main body) -->
  <!-- Left wing windows -->
  <rect x="435" y="330" width="18" height="22" fill="rgba(244,161,29,0.15)" rx="2"/>
  <rect x="435" y="365" width="18" height="22" fill="rgba(244,161,29,0.25)" rx="2"/>
  <rect x="435" y="400" width="18" height="22" fill="rgba(244,161,29,0.1)" rx="2"/>
  <rect x="460" y="330" width="18" height="22" fill="rgba(244,161,29,0.2)" rx="2"/>
  <rect x="460" y="365" width="18" height="22" fill="rgba(244,161,29,0.3)" rx="2"/>
  <rect x="460" y="400" width="18" height="22" fill="rgba(244,161,29,0.15)" rx="2"/>
  <!-- Right wing windows -->
  <rect x="747" y="330" width="18" height="22" fill="rgba(244,161,29,0.2)" rx="2"/>
  <rect x="747" y="365" width="18" height="22" fill="rgba(244,161,29,0.1)" rx="2"/>
  <rect x="747" y="400" width="18" height="22" fill="rgba(244,161,29,0.3)" rx="2"/>
  <rect x="722" y="330" width="18" height="22" fill="rgba(244,161,29,0.15)" rx="2"/>
  <rect x="722" y="365" width="18" height="22" fill="rgba(244,161,29,0.25)" rx="2"/>
  <rect x="722" y="400" width="18" height="22" fill="rgba(244,161,29,0.2)" rx="2"/>

  <!-- Center door -->
  <rect x="576" y="398" width="48" height="60" fill="#162031" rx="2"/>
  <rect x="579" y="401" width="19" height="28" fill="rgba(244,161,29,0.1)" rx="1"/>
  <rect x="600" y="401" width="21" height="28" fill="rgba(244,161,29,0.15)" rx="1"/>

  <!-- === GOLD ACCENT TRIM LINE === -->
  <rect x="0" y="592" width="1200" height="4" fill="url(#goldGrad)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#goldGrad)" opacity="0.4"/>

  <!-- === DATA / CHART PANEL (RIGHT SIDE) === -->
  <!-- Panel background -->
  <rect x="760" y="165" width="390" height="310" rx="8" fill="rgba(26,35,50,0.75)" stroke="rgba(244,161,29,0.18)" stroke-width="1"/>
  <!-- Panel header strip -->
  <rect x="760" y="165" width="390" height="36" rx="8" fill="rgba(244,161,29,0.1)"/>
  <rect x="760" y="189" width="390" height="12" fill="rgba(26,35,50,0.75)"/>
  <text x="780" y="188" font-family="'Barlow', 'Arial Black', sans-serif" font-weight="700" font-size="13" fill="#F4A11D" letter-spacing="2">HB 49 — 2026 KEY UPDATES</text>

  <!-- Divider -->
  <line x1="775" y1="215" x2="1135" y2="215" stroke="rgba(244,161,29,0.15)" stroke-width="1"/>

  <!-- Update items -->
  <!-- Item 1: Fee -->
  <rect x="775" y="225" width="4" height="36" rx="2" fill="#F4A11D"/>
  <text x="790" y="239" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#F4A11D">ANNUAL REPORTING FEE</text>
  <text x="790" y="255" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">$100/building · inflation-adjusted</text>

  <!-- Divider -->
  <line x1="775" y1="272" x2="1135" y2="272" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Item 2: Montgomery County -->
  <rect x="775" y="282" width="4" height="36" rx="2" fill="#C8102E"/>
  <text x="790" y="296" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#C8102E">MONTGOMERY COUNTY WAIVER</text>
  <text x="790" y="312" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Covered under county BEPS program</text>

  <!-- Divider -->
  <line x1="775" y1="328" x2="1135" y2="328" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Item 3: Hospitals -->
  <rect x="775" y="338" width="4" height="36" rx="2" fill="#F4A11D"/>
  <text x="790" y="352" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#F4A11D">HOSPITAL EXEMPTION</text>
  <text x="790" y="368" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Eligible to apply for total exemption</text>

  <!-- Divider -->
  <line x1="775" y1="384" x2="1135" y2="384" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Item 4: SCIF -->
  <rect x="775" y="394" width="4" height="36" rx="2" fill="#C8102E"/>
  <text x="790" y="408" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#C8102E">SCIF EXEMPTION</text>
  <text x="790" y="424" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">EUI target exemption + benchmarking flex</text>

  <!-- Divider -->
  <line x1="775" y1="440" x2="1135" y2="440" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Item 5: 2030 Credits -->
  <rect x="775" y="449" width="4" height="19" rx="2" fill="rgba(244,161,29,0.45)"/>
  <text x="790" y="462" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="rgba(244,161,29,0.7)">RENEWABLE CREDITS + EXCLUSIONS (2030+)</text>

  <!-- === LEFT TEXT PANEL === -->
  <!-- Year badge -->
  <rect x="38" y="80" width="148" height="44" rx="6" fill="url(#redGrad)" opacity="0.9"/>
  <text x="112" y="108" font-family="'Barlow', 'Arial Black', sans-serif" font-weight="900" font-size="22" fill="#fff" text-anchor="middle" letter-spacing="-0.5">2026</text>

  <!-- Main headline -->
  <text x="38" y="165" font-family="'Barlow', 'Arial Black', sans-serif" font-weight="900" font-size="32" fill="#ffffff" letter-spacing="-0.5">MARYLAND</text>
  <text x="38" y="201" font-family="'Barlow', 'Arial Black', sans-serif" font-weight="900" font-size="32" fill="#F4A11D" letter-spacing="-0.5">BEPS UPDATES</text>

  <!-- Gold rule -->
  <rect x="38" y="212" width="100" height="3" rx="1.5" fill="url(#goldGrad)"/>

  <!-- Subtitle -->
  <text x="38" y="238" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" letter-spacing="0.5">HOUSE BILL 49 · EFFECTIVE 2026</text>

  <!-- Small badge bottom left -->
  <rect x="38" y="530" width="200" height="34" rx="5" fill="rgba(200,16,46,0.15)" stroke="rgba(200,16,46,0.3)" stroke-width="1"/>
  <text x="138" y="552" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#C8102E" text-anchor="middle" letter-spacing="1">MARYLAND SMART ENERGY</text>

  <!-- Corner accent dots -->
  <circle cx="38" cy="38" r="3" fill="#F4A11D" opacity="0.6"/>
  <circle cx="1162" cy="38" r="3" fill="#F4A11D" opacity="0.6"/>
  <circle cx="38" cy="562" r="3" fill="#C8102E" opacity="0.6"/>
  <circle cx="1162" cy="562" r="3" fill="#C8102E" opacity="0.6"/>

  <!-- Subtle horizontal scan lines for depth -->
  <rect width="1200" height="600" fill="url(#grid)" opacity="0.4"/>
</svg>
